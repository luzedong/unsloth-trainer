inherit: base.yaml

model:
  model_name: "Qwen/Qwen3.5-27B"
  max_seq_length: 4096
  load_in_4bit: false
  load_in_16bit: true
  full_finetuning: false

training:
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5

dpo:
  beta: 0.1
  loss_type: "sigmoid"

data:
  train_file: "data/processed/dpo_train.jsonl"
  format: "dpo"

output:
  experiment_name: "dpo_qwen3.5_27b_medical"
