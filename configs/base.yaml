# Default configuration - all experiment configs inherit from this file.

model:
  max_seq_length: 2048
  load_in_4bit: true
  dtype: null

lora:
  r: 16
  lora_alpha: 16
  lora_dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_rslora: false
  use_gradient_checkpointing: "unsloth"

training:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  warmup_steps: 10
  num_train_epochs: 3
  learning_rate: 2.0e-4
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 3
  seed: 42
  bf16: true
  optim: "adamw_8bit"

data:
  train_file: null
  val_file: null
  val_size: 0.05
  format: "alpaca"

output:
  dir: "outputs"
  experiment_name: null
